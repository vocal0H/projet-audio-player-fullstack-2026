version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: radio_postgres
    environment:
      POSTGRES_USER: radio
      POSTGRES_PASSWORD: radio123
      POSTGRES_DB: radio_db
    ports:
      - "5432:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7
    container_name: radio_redis
    ports:
      - "6379:6379"

  server:
    build: ./server
    container_name: radio_server
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./media:/app/media

  client:
    build: ./client
    container_name: radio_client
    ports:
      - "5173:5173"
    depends_on:
      - server